# sops configuration for Monty-CNS-Secrets.
#
# Each age: entry is a public key for a machine or recovery key that
# can decrypt files matching the path_regex. Private keys never appear
# here — they live in ~/.config/sops/age/keys.txt on each machine, 0600.
#
# Creation rules are permissive enough to cover:
#   - The canonical encrypted bundle:         *.sops.yaml, .sops.json, etc
#   - File-based secrets (keys, certs):       *.sops.<ext>
#   - Recovery / temporary plaintext files:   *.plain, *.dec, *.unencrypted
#
# The last rule matters because the recovery flow in
# docs/secrets-setup.md writes a *.plain file during block-scalar
# rescue, then encrypts it with sops -e. Without a matching rule,
# sops errors with "no matching creation rules found" even when
# --age is passed explicitly.

creation_rules:
  - path_regex: '\.sops\.(ya?ml|json|env|toml|ini)$'
    age: >-
      age1REPLACE_ME_WITH_LAPTOP_PUBLIC_KEY,
      age1REPLACE_ME_WITH_DESK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_WORK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_HOME_PUBLIC_KEY,
      age1REPLACE_ME_WITH_RECOVERY_KEY_STORED_OFFLINE

  - path_regex: '\.sops\.[a-zA-Z0-9]+$'
    age: >-
      age1REPLACE_ME_WITH_LAPTOP_PUBLIC_KEY,
      age1REPLACE_ME_WITH_DESK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_WORK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_HOME_PUBLIC_KEY,
      age1REPLACE_ME_WITH_RECOVERY_KEY_STORED_OFFLINE

  - path_regex: '\.(plain|dec|unencrypted)(\.[a-zA-Z0-9]+)?$'
    age: >-
      age1REPLACE_ME_WITH_LAPTOP_PUBLIC_KEY,
      age1REPLACE_ME_WITH_DESK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_WORK_PUBLIC_KEY,
      age1REPLACE_ME_WITH_HOME_PUBLIC_KEY,
      age1REPLACE_ME_WITH_RECOVERY_KEY_STORED_OFFLINE
